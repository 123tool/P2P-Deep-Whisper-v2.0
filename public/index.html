<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEEP-WHISPER V2 | SECURE P2P</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #050505; color: #d1d1d1; font-family: 'JetBrains Mono', monospace; }
        .deep-card { border: 1px solid #1f1f1f; background: #0a0a0a; transition: 0.3s; }
        .deep-card:hover { border-color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.1); }
        .self-destruct { animation: fadeOut 30s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; display: none; } }
        .panic-btn { background: #7f1d1d; color: white; transition: 0.2s; }
        .panic-btn:hover { background: #ef4444; transform: scale(1.05); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <header class="p-4 border-b border-red-900 flex justify-between items-center bg-black">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-600 animate-pulse rounded-full"></div>
            <h1 class="text-lg font-bold tracking-widest text-red-600">DEEP-WHISPER <span class="text-xs text-gray-600">V2.0</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="panic()" class="panic-btn px-3 py-1 text-xs font-bold border border-red-500 rounded">PANIC</button>
        </div>
    </header>

    <div id="setup" class="absolute inset-0 z-50 bg-black flex items-center justify-center p-6">
        <div class="deep-card p-8 max-w-md w-full border-t-4 border-t-red-600">
            <h2 class="text-red-500 mb-4 font-bold uppercase tracking-widest">Initial Handshake</h2>
            <p class="text-xs text-gray-500 mb-6 font-sans">Masukkan Secret Key untuk enkripsi E2EE. Kunci ini tidak pernah dikirim ke server.</p>
            <input type="password" id="room-key" placeholder="Enter Secret Key..." class="w-full bg-[#111] border border-gray-800 p-3 mb-4 outline-none focus:border-red-600 text-red-500">
            <button onclick="startSession()" class="w-full bg-red-800 p-3 font-bold hover:bg-red-600 text-black">START SECURE SESSION</button>
        </div>
    </div>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></main>

    <footer class="p-4 bg-black border-t border-gray-900">
        <div id="typing-indicator" class="text-[10px] text-red-900 mb-1 italic"></div>
        <div class="flex gap-2">
            <input type="file" id="file-input" class="hidden" onchange="handleFile(this)">
            <button onclick="document.getElementById('file-input').click()" class="deep-card px-3 py-2 text-xs hover:text-red-500">📎</button>
            <input type="text" id="input" autocomplete="off" placeholder="Type encrypted message..." 
                class="flex-1 bg-[#0a0a0a] border border-gray-800 p-3 outline-none focus:border-red-600 text-sm">
            <button onclick="sendMessage()" class="bg-red-900 text-black font-bold px-6 hover:bg-red-600">SEND</button>
        </div>
    </footer>

    <script>
        const socket = io();
        let secretKey = "";

        function startSession() {
            const key = document.getElementById('room-key').value;
            if(key.length < 4) return alert("Key too weak!");
            secretKey = key;
            document.getElementById('setup').style.display = 'none';
        }

        function panic() {
            window.location.href = "https://www.google.com";
        }

        function encrypt(text) {
            return CryptoJS.AES.encrypt(text, secretKey).toString();
        }

        function decrypt(ciphertext) {
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, secretKey);
                return bytes.toString(CryptoJS.enc.Utf8);
            } catch(e) { return "🚩 [Decryption Failed - Wrong Key]"; }
        }

        function sendMessage() {
            const msg = document.getElementById('input').value;
            if (msg && secretKey) {
                const encrypted = encrypt(msg);
                socket.emit('chat message', { type: 'text', content: encrypted });
                document.getElementById('input').value = '';
            }
        }

        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const encryptedFile = encrypt(e.target.result);
                socket.emit('chat message', {
                    type: 'file',
                    fileName: file.name,
                    fileType: file.type,
                    content: encryptedFile
                });
            };
            reader.readAsDataURL(file);
        }

        socket.on('chat message', (data) => {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = "deep-card p-3 self-destruct relative overflow-hidden";
            
            const decrypted = decrypt(data.content);
            const isMyKeyValid = !decrypted.includes("🚩");

            let html = `<div class="text-[10px] text-gray-600 mb-1 uppercase tracking-tighter">${data.sender} • ${data.time}</div>`;
            
            if (data.type === 'text') {
                html += `<p class="text-sm ${isMyKeyValid ? 'text-gray-300' : 'text-red-900 font-bold'}">${decrypted}</p>`;
            } else if (data.type === 'file' && isMyKeyValid) {
                if (data.fileType.startsWith('image/')) {
                    html += `<img src="${decrypted}" class="rounded border border-gray-800 mt-2 max-h-64">`;
                } else {
                    html += `<a href="${decrypted}" download="${data.fileName}" class="text-red-500 underline text-xs mt-2 block italic">💾 DOWNLOAD RAWA DATA</a>`;
                }
            } else {
                html += `<p class="text-xs text-red-900">[ENCRYPTED BLOB]</p>`;
            }
            
            div.innerHTML = html + `<div class="absolute bottom-0 left-0 h-1 bg-red-900 w-full animate-pulse"></div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        document.getElementById('input').addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
        window.addEventListener('keydown', (e) => { if(e.key === "Escape") panic(); });
    </script>
</body>
</html>
